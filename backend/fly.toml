# fly.toml app configuration file generated for timesheet-api on 2026-03-27T11:53:07-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'timesheet-api'
primary_region = 'gru'

[build]
  dockerfile = 'Dockerfile'

[env]
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'INFO'
  MAX_FILE_SIZE_MB = '50'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
